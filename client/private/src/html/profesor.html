<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesor · The Overworld Academy</title>
    
    <link rel="stylesheet" href="./main.css">
    <link rel="stylesheet" href="./profesor.css">

    <link rel="shortcut icon" href="/img/favicon.webp" type="image/x-icon">

      <!-- loader -->
</head>

<body class="profesor-page">
    <div id="loader-container"><div class="loader"></div></div>

    <nav>
        <div class="nav-left">
            <img class="nav-img-logo" src="/img/the-overworld-academy-logo.webp" alt="Nuestro logo">
        </div>
        <div class="nav-right">
            <a href="/perfil.html"><img class="icon" src="/img/user-logo.svg" alt="Perfil"></a>
            <img class="icon active" src="/img/materias-logo.svg" alt="Materias"> 
            <img class="icon" id="boton-salir" src="/img/logout-logo.svg" alt="Salir">  
        </div> 
    </nav>

    <div id="content-wrapper">
        <div id="modal-opcion" class="modal hidden">
            <div class="modal-contenido">
                <p class="minecraft-p">Estas seguro de que queres salir?</p>
                <div class="modal-botones">
                    <button id="confirmar-salida" class="large-button sound-button red-button">Salir</button>
                    <button id="cancelar-salida" class="large-button sound-button">Cancelar</button>
                </div>
            </div>
        </div>

        <h1 id="materia-title" class="materias-title">Propuesta: </h1>

        <section class="profesor-cartelera flex-c-c">
            <p class="minecraft-p">Cartelera de la materia</p>
            <textarea id="cartelera" class="large-input" type="text" disabled></textarea>
            <button class="large-button sound-button" id="editar-cartelera">Editar</button>
        </section>
        
        <div class="notas-wrapper flex-c-c">
            <p class="minecraft-p">Notas alumnos</p>
            <div id="notas-container" class="notas-container">
                <div class="nota-card-alumno">
                    <p class="nota-p">Padrón</p>
                    <p class="nota-p">Nombre y apellido</p>
                    <p class="nota-p">TP1</p>
                    <p class="nota-p">TP2</p>
                    <p class="nota-p">P1</p>
                    <p class="nota-p">P2</p>
                    <p class="nota-p">%</p>
                    <p class="nota-p"></p>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer" class="flex-c-c">
        <p>&copy; 2025 por <a href="https://github.com/FIUBA-return-0" target="_blank">return 0;</a></p>
        <p>Todos los derechos reservados</p>
    </footer>

    <script src="/main.js"></script>
    <script src="/profesor.js"></script>
</body>
