<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director · The Overworld Academy</title>
    
    <link rel="stylesheet" href="./main.css">
    <link rel="stylesheet" href="./director.css">

    <link rel="shortcut icon" href="/img/favicon.webp" type="image/x-icon">

    <!-- loader -->
    <script>document.documentElement.style.setProperty('--vh', `${window.innerHeight*0.01}px`);</script>

#f92033 0 26px,rgba(0,0,0,0) 0 30px,#643700 0) bottom 10px left 50%,linear-gradient(90deg,rgba(0,0,0,0) 10px,#f92033 0 16px,#222a87 0 24px,#feee49 0 26px,#222a87 0 30px,#643700 0) bottom 8px left 50%,linear-gradient(90deg,rgba(0,0,0,0) 12px,#222a87 0 18px,#feee49 0 20px,#222a87 0 30px,#643700 0) bottom 6px left 50%,linear-gradient(90deg,rgba(0,0,0,0) 8px,#643700 0 12px,#222a87 0 30px,#643700 0) bottom 4px left 50%,linear-gradient(90deg,rgba(0,0,0,0) 6px,#643700 0 14px,#222a87 0 26px,rgba(0,0,0,0) 0) bottom 2px left 50%,linear-gradient(90deg,rgba(0,0,0,0) 6px,#643700 0 10px,rgba(0,0,0,0) 0) bottom 0 left 50%;background-size:34px 2px;background-repeat:no-repeat;animation:inherit;animation-name:l10-1}@keyframes l10-0{0%,30%{background-position:0 0}100%,50%{background-position:0 -.1px}}@keyframes l10-1{100%,50%{top:109.5%}}@keyframes l10-2{0%,30%{transform:translateY(0)}100%,80%{transform:translateY(-260%)}}</style>
</head>
<body class="director-page flex-c-c">
    <div id="loader-container"><div class="loader"></div></div>

    <nav>
        <div class="nav-left">
            <img class="nav-img-logo" src="/img/the-overworld-academy-logo.webp" alt="Nuestro logo">
        </div>
        <div class="nav-right">
            <a href="/perfil.html"><img class="icon" src="/img/user-logo.svg" alt="Perfil"></a>
            <img class="icon active" src="/img/materias-logo.svg" alt="Materias"> 
            <img class="icon" id="boton-salir" src="/img/logout-logo.svg" alt="Salir">  
        </div> 
    </nav>

    <div id="modal-opcion" class="modal hidden">
        <div class="modal-contenido">
        <p class="minecraft-p">Estas seguro de que queres salir?</p>
        <div class="modal-botones">
            <button id="confirmar-salida" class="large-button sound-button red-button">Salir</button>
            <button id="cancelar-salida" class="large-button sound-button">Cancelar</button>
            </div>
        </div>
    </div>

    <section id="welcome">
        <h1 class="materias-title">Bienvenido director de carrera Facundo</h1>
    </section>

    <section id="campos-carrera">
        <p class="minecraft-p">Nombre de la carrera</p>
        <input id="nombre" class="large-input" type="text" disabled>
        <p class="minecraft-p">Descripcion de la carrera</p>
        <input id="description" class="large-input" type="text" disabled>
        <p class="minecraft-p">Foto de la carrera (URL directa)</p>
        <input id="foto" class="large-input" type="text" disabled>
        <button id="editar-carrera" class="large-button sound-button">Editar</button>
        <p id="error-edicion" class="minecraft-p red-minecraft-p hidden"><span class="emoji-font">⛔</span> Los campos obligatorios no pueden estar vacíos.</p>
    </section>
    
    <section id="materias" class="flex-c-c">
        <p class="minecraft-p">Materias de la carrera</p>
        <div id="materias-wrapper" class="materias-wrapper flex-c-c"></div>
        <button class="large-button sound-button green-button" data-href="/editar-materia.html?id=crear">Crear nueva materia</button>
    </section>

    <footer class="footer" class="flex-c-c">
        <p>&copy; 2025 por <a href="https://github.com/FIUBA-return-0" target="_blank">return 0;</a></p>
        <p>Todos los derechos reservados</p>
    </footer>

    <script src="/main.js"></script>
    <script src="/createMateriaCard.js"></script>
    <script src="/vistaDirector.js"></script>
</body>
</html>
