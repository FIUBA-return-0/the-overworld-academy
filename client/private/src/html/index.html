<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · The Overworld Academy</title>

    <link rel="stylesheet" href="/main.css">
    <link rel="stylesheet" href="/auth.css">
    <link rel="stylesheet" href="/login.css">

</head>

<body class="auth-page flex-c-c">
    <!-- hola profes :) -->

    <div class="login-wrapper-logo">
        <img src="/img/the-overworld-academy-logo.webp" alt="Nuestro logo">
        <p class="login-amarillo-texto">Aguante Linux!</p>
    </div>

    <div class="auth-wrapper">
        <p class="minecraft-p">Usuario</p>
        <input id="usuario" class="large-input" type="text" required maxlength="30">
        <p id="error-usuario" class="minecraft-p red-minecraft-p hidden"><span class="emoji-font">⛔</span> El usuario no puede estar vacio</p>
        <p id="error-usuario-invalido" class="minecraft-p red-minecraft-p hidden"><span class="emoji-font">⛔</span> Tu usuario es invalido</p>
        <p class="minecraft-p">Contrasenia</p>
        <input id="contrasenia" class="large-input" type="text" style="-webkit-text-security: square;" autocomplete="off" required>
        <p id="error-contrasenia" class="minecraft-p red-minecraft-p hidden"><span class="emoji-font">⛔</span> La contrasenia no puede estar vacia</p>
        <p class="minecraft-p">No tenes cuenta? <a href="registrarse.html">Registrarse</a></p>
        <button id="login" class="large-button sound-button">Iniciar sesion</button>
    </div>

    <footer class="footer-auth">
        <p class="minecraft-p">The Overworld Academy 1.0.0</p>
        <p class="minecraft-p">Copyright <a href="https://github.com/FIUBA-return-0" target="_blank">return 0;</a> No distribuir</p>
    </footer>

    <script src="/main.js"></script>
    <script src="/frasesRandom.js"></script>
    <script src="/loginPOST.js"></script>
    <script src="/login.js"></script>
</body>
</html>
