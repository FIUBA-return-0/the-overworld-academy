<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil · The Overworld Academy</title>

    <link rel="stylesheet" href="./main.css">
</head>
<body class="perfil-page">
    <nav>
        <div class="nav-left">
            <img class="nav-img-logo" src="/img/the-overworld-academy-logo.png" alt="Nuestro logo">
        </div>
    </nav>

    <section id="easteregg-1" class="hidden">
        <div id="easteregg-1-img"></div>
    </section>

    <section class="perfil-data">
        <div class="perfil-p-wrapper">
            <img class="perfil-p" src="/img/default-pp.png" alt="Foto de perfil.">
        </div>
        <div class="perfil-text-data-box">
            <div class="perfil-text-data-box-wrapper">
                <p class="minecraft-p">Usuario</p>
                <input class="large-input" type="text">
                <p class="minecraft-p">Nombre completo</p>
                <input class="large-input" type="text">
                <p class="minecraft-p">Padron</p>
                <input class="large-input" type="text">
                <p class="minecraft-p">Carrera</p>
                <input class="large-input" type="text">
                <p class="minecraft-p">Bio</p>
                <textarea class="large-input" type="text"></textarea>
                <button class="large-button sound-button">Editar perfil</button>
                <button class="large-button sound-button">Cambiar contrasenia</button>
                <button id="borrar-cuenta" class="large-button sound-button red-button">Bajarme de la carrera</button>
            </div>
        </div>
    </section>
    
    <script src="./main.js"></script>
</body>
</html>
