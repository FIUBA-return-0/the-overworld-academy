<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil · The Overworld Academy</title>
    
    <link rel="stylesheet" href="/main.css">
    <link rel="stylesheet" href="/perfil.css">
    <link rel="stylesheet" href="/cambiar-pp.css">

    <link rel="shortcut icon" href="/img/favicon.webp" type="image/x-icon">

    <!-- loader -->
    <script>document.documentElement.style.setProperty('--vh', `${window.innerHeight*0.01}px`);</script>

#f92033 0 26px,rgba(0,0,0,0) 0 30px,#643700 0) bottom 10px left 50%,linear-gradient(90deg,rgba(0,0,0,0) 10px,#f92033 0 16px,#222a87 0 24px,#feee49 0 26px,#222a87 0 30px,#643700 0) bottom 8px left 50%,linear-gradient(90deg,rgba(0,0,0,0) 12px,#222a87 0 18px,#feee49 0 20px,#222a87 0 30px,#643700 0) bottom 6px left 50%,linear-gradient(90deg,rgba(0,0,0,0) 8px,#643700 0 12px,#222a87 0 30px,#643700 0) bottom 4px left 50%,linear-gradient(90deg,rgba(0,0,0,0) 6px,#643700 0 14px,#222a87 0 26px,rgba(0,0,0,0) 0) bottom 2px left 50%,linear-gradient(90deg,rgba(0,0,0,0) 6px,#643700 0 10px,rgba(0,0,0,0) 0) bottom 0 left 50%;background-size:34px 2px;background-repeat:no-repeat;animation:inherit;animation-name:l10-1}@keyframes l10-0{0%,30%{background-position:0 0}100%,50%{background-position:0 -.1px}}@keyframes l10-1{100%,50%{top:109.5%}}@keyframes l10-2{0%,30%{transform:translateY(0)}100%,80%{transform:translateY(-260%)}}</style>
</head>

<body class="perfil-page">
    <div id="loader-container"><div class="loader"></div></div>

    <nav>
        <div class="nav-left">
            <img class="nav-img-logo" src="/img/the-overworld-academy-logo.webp" alt="Nuestro logo">
        </div>
        <div class="nav-right">
            <img class="icon active" src="/img/user-logo.svg" alt="Perfil">
            <img class="icon" id="boton-materias" src="/img/materias-logo.svg" alt="Materias"> 
            <img class="icon" id="boton-salir" src="/img/logout-logo.svg" alt="Salir">  
        </div> 
    </nav>

    <div id="modal-opcion" class="modal hidden">
        <div class="modal-contenido">
        <p class="minecraft-p">Estas seguro de que queres salir?</p>
        <div class="modal-botones">
            <button id="confirmar-salida" class="large-button sound-button red-button">Salir</button>
            <button id="cancelar-salida" class="large-button sound-button">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modal-opcion-borrar-cuenta" class="modal hidden">
        <div class="modal-contenido">
        <p class="minecraft-p">Vas a tirar surrender?</p>
        <div class="modal-botones">
            <button id="cancelar-borrar" class="large-button sound-button">Seguir luchando</button>
            <button id="borrar-cuenta" class="large-button sound-button red-button">Rendirme</button>
            </div>
        </div>
    </div>

    <div id="modal-cambiar-foto" class="modal hidden">
        <div class="salir-pp" onclick="document.getElementById('modal-cambiar-foto').classList.add('hidden');document.getElementsByTagName('body')[0].style = '';"></div>
        <div class="modal-contenido-pp">
            <p class="minecraft-p">Choose your fighter</p>
            <div class="modal-fotos">
                <!-- Aca van las fotos defaults -->
                <img src="/img/pp1.webp" onclick="sound24.play();">
                <img src="/img/pp2.webp" onclick="sound24.play();">
                <img src="/img/pp3.webp" onclick="sound7.play();">
                <img src="/img/pp4.webp" onclick="sound12.play();">
                <img src="/img/pp5.webp" onclick="sound10.play();">
                <img src="/img/pp6.webp" onclick="sound29.play();">
                <img src="/img/pp7.webp" onclick="sound16.play();">
                <img src="/img/pp8.webp">
                <img src="/img/pp9.webp" onclick="sound25.play();">
                <img src="/img/pp10.webp" onclick="sound28.play();">
                <img src="/img/pp11.webp" onclick="sound28.play();">
                <img src="/img/pp12.webp">
                <img src="/img/pp13.webp">
                <img src="/img/pp14.webp" onclick="sound18.play();">
                <img src="/img/pp15.webp" onclick="sound8.play();">
                <img src="/img/pp16.webp" onclick="sound17.play();">
                <img src="/img/pp17.webp" onclick="sound13.play();">
                <img src="/img/pp18.webp" onclick="sound19.play();">
                <img src="/img/pp19.webp" onclick="sound8.play();">
                <img src="/img/pp20.webp" onclick="sound15.play();">
                <img src="/img/pp21.webp" onclick="sound26.play();">
                <img src="/img/pp22.webp" onclick="sound22.play();">
                <img src="/img/pp23.webp" onclick="sound20.play();">
                <img src="/img/pp24.webp" onclick="sound11.play();">
                <img src="/img/pp25.webp" onclick="sound21.play();">
                <img src="/img/pp26.webp">
                <img src="/img/pp27.webp" onclick="sound23.play();">
                <img src="/img/pp28.webp" onclick="sound14.play();">
                <img src="/img/pp29.webp" onclick="sound8.play();">
                <img src="/img/pp30.webp">
                <img src="/img/pp31.webp" onclick="sound8.play();">
                <img src="/img/pp32.webp" onclick="sound27.play();">
                <img src="/img/pp33.webp" onclick="sound30.play();">
                <img src="/img/pp34.webp" onclick="sound31.play();">
                <!-- Aca van las fotos defaults -->
            </div>
        </div>
    </div>

    <div id="easteregg-1" class="hidden">
        <div id="easteregg-1-img"></div>
    </div>
        
    <section class="perfil-data">
        <div class="perfil-p-wrapper">
            <img class="perfil-p" id="foto-perfil" src="" alt="Foto de perfil" style="cursor: pointer;" onclick="abrirModalFoto()">
        </div>
        <div class="perfil-text-data-box">
            <div class="perfil-text-data-box-wrapper">

                <p class="minecraft-p">Usuario</p>
                <input class="large-input" type="text" id="usuario" disabled>

                <p class="minecraft-p">Apellido</p>
                <input class="large-input" type="text" id="apellido" disabled>

                <p class="minecraft-p">Nombre</p>
                <input class="large-input" type="text" id="nombre" disabled>

                <p class="minecraft-p">Padron</p>
                <input class="large-input" type="text" id="padron" disabled>

                <p class="minecraft-p">Carrera</p>
                <input class="large-input" type="text" id="carrera" disabled>

                <p class="minecraft-p">Biografia</p>
                <textarea class="large-input" type="text" id="biografia" disabled placeholder="Hello world!"></textarea>

                <button class="large-button sound-button" id="editar-perfil">Editar perfil</button>
                <button class="large-button sound-button" data-href="contrasenia.html">Cambiar contrasenia</button>
                <button class="large-button sound-button red-button" onclick="document.getElementById('easteregg-1').classList.remove('hidden');sound2.play(); window.scrollTo(0, 0);">Bajarme de la carrera</button>
            </div>
        </div>
    </section>

    <footer class="footer" class="flex-c-c">
        <p>&copy; 2025 por <a href="https://github.com/FIUBA-return-0" target="_blank">return 0;</a></p>
        <p>Todos los derechos reservados</p>
    </footer>
    
    <script src="/main.js"></script>
    <script src="/imagenesRandom.js"></script>
    <script src="/editarPerfil.js"></script>
    <script src="/cambiarImagen.js"></script>
    <script src="/borrarCuenta.js"></script>
    <script src="/cambiarMateriasNav.js"></script>
</body>
</html>
