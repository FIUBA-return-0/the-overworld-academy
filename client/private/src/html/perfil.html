<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil · The Overworld Academy</title>
    <link rel="stylesheet" href="./main.css">
</head>

<body class="perfil-page">
    <nav>
        <div class="nav-left">
            <img class="nav-img-logo" src="/img/the-overworld-academy-logo.png" alt="Nuestro logo">
        </div>
        <div class="nav-right">
            <img class="user-icon active" src="/img/user-logo.svg" alt="Perfil">
            <img class="materias-icon" src="/img/materias-logo.svg" alt="Materias"> 
            <img class="logout-icon" src="/img/logout-logo.svg" alt="Salir">  
        </div> 
    </nav>

    <section id="easteregg-1" class="hidden" onclick="document.getElementById('easteregg-1').classList.add('hidden');">
        <div id="easteregg-1-img"></div>
    </section>

    <section class="perfil-data">
        <div class="perfil-p-wrapper">
            <img class="perfil-p" src="/img/default-profile-image.svg" alt="Foto de perfil.">
        </div>
        <div class="perfil-text-data-box">
            <div class="perfil-text-data-box-wrapper">
                <p class="minecraft-p">Usuario</p>
                <input class="large-input" type="text">
                <p class="minecraft-p">Nombre completo</p>
                <input class="large-input" type="text">
                <p class="minecraft-p">Padron</p>
                <input class="large-input" type="text">
                <p class="minecraft-p">Carrera</p>
                <input class="large-input" type="text">
                <p class="minecraft-p">Descripcion</p>
                <textarea class="large-input" type="text"></textarea>
                <button class="large-button sound-button">Editar perfil</button>
                <button class="large-button sound-button">Cambiar contrasenia</button>
                <button class="large-button sound-button red-button" onclick="document.getElementById('easteregg-1').classList.remove('hidden'); window.scrollTo(0, 0);">Bajarme de la carrera</button>
            </div>
        </div>
    </section>
    <script src="./main.js"></script>
</body>
</html>
